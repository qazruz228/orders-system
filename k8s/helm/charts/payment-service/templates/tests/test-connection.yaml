apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "payment-service.fullname" . }}-test-connection"
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - -qO-
        - http://{{ include "payment-service.fullname" . }}:{{ .Values.service.port }}/actuator/health
