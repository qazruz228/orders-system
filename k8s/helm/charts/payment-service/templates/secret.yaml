{{- if not .Values.config.datasource.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "payment-service.datasourceSecretName" . }}
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.datasource.usernameKey }}: {{ .Values.config.datasource.username | quote }}
  {{ .Values.config.datasource.passwordKey }}: {{ .Values.config.datasource.password | quote }}
{{- end }}
