stages:
  - test
  - package
  - image
  - deploy
  - post_deploy

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  ORDER_SERVICE_IMAGE: "$CI_REGISTRY_IMAGE/order-service"
  PAYMENT_SERVICE_IMAGE: "$CI_REGISTRY_IMAGE/payment-service"
  HELM_RELEASE_NAME: "order-system"
  HELM_CHART_PATH: "k8s/helm"
  KUBE_NAMESPACE_STAGING: "order-system-staging"
  KUBE_NAMESPACE_PRODUCTION: "order-system-production"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

.maven_template:
  image: maven:3.9.9-eclipse-temurin-17
  cache:
    key: "$CI_PROJECT_NAME-maven"
    paths:
      - .m2/repository

test:order-service:
  extends: .maven_template
  stage: test
  script:
    - cd order-service
    - chmod +x mvnw
    - ./mvnw $MAVEN_CLI_OPTS clean verify

test:payment-service:
  extends: .maven_template
  stage: test
  script:
    - cd payment-service
    - chmod +x mvnw
    - ./mvnw $MAVEN_CLI_OPTS clean verify

helm:lint:
  stage: package
  image:
    name: alpine/helm:3.15.4
    entrypoint: [""]
  script:
    - helm dependency build "$HELM_CHART_PATH"
    - helm lint "$HELM_CHART_PATH"
    - >
      helm template "$HELM_RELEASE_NAME" "$HELM_CHART_PATH"
      --namespace "$KUBE_NAMESPACE_STAGING"
      --set order-service.image.repository="$ORDER_SERVICE_IMAGE"
      --set order-service.image.tag="$IMAGE_TAG"
      --set payment-service.image.repository="$PAYMENT_SERVICE_IMAGE"
      --set payment-service.image.tag="$IMAGE_TAG"

.kaniko_template:
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

image:order-service:
  extends: .kaniko_template
  needs:
    - test:order-service
    - helm:lint
  script:
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR/order-service"
      --dockerfile "$CI_PROJECT_DIR/order-service/Dockerfile"
      --destination "$ORDER_SERVICE_IMAGE:$IMAGE_TAG"

image:payment-service:
  extends: .kaniko_template
  needs:
    - test:payment-service
    - helm:lint
  script:
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR/payment-service"
      --dockerfile "$CI_PROJECT_DIR/payment-service/Dockerfile"
      --destination "$PAYMENT_SERVICE_IMAGE:$IMAGE_TAG"

.deploy_template:
  stage: deploy
  image: dtzar/helm-kubectl:3.15.4
  before_script:
    - if [ -n "$KUBE_CONTEXT" ]; then kubectl config use-context "$KUBE_CONTEXT"; fi
  script:
    - helm dependency build "$HELM_CHART_PATH"
    - >
      helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH"
      --namespace "$KUBE_NAMESPACE"
      --wait
      --timeout 5m
      --set order-service.image.repository="$ORDER_SERVICE_IMAGE"
      --set order-service.image.tag="$IMAGE_TAG"
      --set payment-service.image.repository="$PAYMENT_SERVICE_IMAGE"
      --set payment-service.image.tag="$IMAGE_TAG"
  needs:
    - image:order-service
    - image:payment-service

deploy:staging:
  extends: .deploy_template
  environment:
    name: staging
  variables:
    KUBE_CONTEXT: "$KUBE_CONTEXT_STAGING"
    KUBE_NAMESPACE: "$KUBE_NAMESPACE_STAGING"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy:production:
  extends: .deploy_template
  environment:
    name: production
  variables:
    KUBE_CONTEXT: "$KUBE_CONTEXT_PRODUCTION"
    KUBE_NAMESPACE: "$KUBE_NAMESPACE_PRODUCTION"
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  allow_failure: false

post_deploy:rollout_staging:
  stage: post_deploy
  image: dtzar/helm-kubectl:3.15.4
  variables:
    KUBE_CONTEXT: "$KUBE_CONTEXT_STAGING"
    KUBE_NAMESPACE: "$KUBE_NAMESPACE_STAGING"
  before_script:
    - if [ -n "$KUBE_CONTEXT" ]; then kubectl config use-context "$KUBE_CONTEXT"; fi
  script:
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$HELM_RELEASE_NAME-order-service" --timeout=180s
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$HELM_RELEASE_NAME-payment-service" --timeout=180s
  needs:
    - deploy:staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

rollback:production:
  stage: post_deploy
  image: dtzar/helm-kubectl:3.15.4
  environment:
    name: production
    action: prepare
  variables:
    KUBE_CONTEXT: "$KUBE_CONTEXT_PRODUCTION"
    KUBE_NAMESPACE: "$KUBE_NAMESPACE_PRODUCTION"
  before_script:
    - if [ -n "$KUBE_CONTEXT" ]; then kubectl config use-context "$KUBE_CONTEXT"; fi
  script:
    - helm -n "$KUBE_NAMESPACE" rollback "$HELM_RELEASE_NAME"
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$HELM_RELEASE_NAME-order-service" --timeout=180s
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$HELM_RELEASE_NAME-payment-service" --timeout=180s
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  allow_failure: false