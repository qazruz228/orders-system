spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5435/ordersystemdb
    username: ordersystem
    password: ordersystem
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


